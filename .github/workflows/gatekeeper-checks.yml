name: Gatekeeper Checks

on:
  push:
    branches:
      - main
      - develop

permissions: read-all

jobs:
  run-affected-tests:
    name: Run Affected Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11', '3.12']

    steps:
      - name: Check out full repository history
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with ruff
        run: |
          ruff check src/ tests/

      - name: Cache .testmondata
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v5
        with:
          path: .testmondata
          key: testmon-data-${{ matrix.python-version }}-${{ github.ref }}-${{ github.sha }}
          restore-keys: |
            testmon-data-${{ matrix.python-version }}-${{ github.ref }}-
            testmon-data-${{ matrix.python-version }}-

      - name: Run affected tests in parallel
        run: |
          pytest --testmon -n auto --verbose
