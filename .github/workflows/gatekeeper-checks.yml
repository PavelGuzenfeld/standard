name: Gatekeeper Checks

on:
  push:
    branches:
      - main
      - develop

permissions: read-all

jobs:
  run-affected-tests:
    name: Run Affected Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11', '3.12']

    steps:
      - name: Check out full repository history
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with ruff
        run: |
          ruff check src/ tests/

      - name: Cache .testmondata
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: .testmondata
          key: testmon-data-${{ matrix.python-version }}-${{ github.ref }}-${{ github.sha }}
          restore-keys: |
            testmon-data-${{ matrix.python-version }}-${{ github.ref }}-
            testmon-data-${{ matrix.python-version }}-

      - name: Run affected tests in parallel
        run: |
          pytest --testmon -n auto --verbose
