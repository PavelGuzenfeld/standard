name: Compliance

on:
  workflow_call:
    inputs:
      org:
        type: string
        required: true
        description: 'GitHub org or user to scan'
      auto_update:
        type: boolean
        default: false
        description: 'Open PRs to update drifted repos'
      dry_run:
        type: boolean
        default: false
        description: 'Show what would change without opening PRs (requires auto_update)'
      pr_title_prefix:
        type: string
        default: 'chore(deps): '
        description: 'Prefix for auto-update PR titles'
      pr_labels:
        type: string
        default: 'dependencies,standard-ci'
        description: 'Comma-separated labels for auto-update PRs'
      post_to_gist:
        type: boolean
        default: false
        description: 'Update a pinned gist with dashboard content'
      gist_id:
        type: string
        default: ''
        description: 'Gist ID to update (required if post_to_gist is true)'
      runner:
        type: string
        default: '"ubuntu-latest"'
        description: 'Runner labels as JSON'
    secrets:
      bot_token:
        required: false
        description: 'GitHub token with org/repo access'
      app_id:
        required: false
        description: 'GitHub App ID for generating installation token'
      app_private_key:
        required: false
        description: 'GitHub App private key (PEM)'

permissions:
  contents: read

jobs:
  compliance:
    name: Scan & Report
    runs-on: ${{ fromJSON(inputs.runner) }}
    steps:
      - name: Checkout standard
        uses: actions/checkout@v6
        with:
          repository: PavelGuzenfeld/standard

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install standard-ci
        run: pip install .

      - name: Check App credentials
        id: app-check
        env:
          HAS_APP: ${{ secrets.app_id != '' && secrets.app_private_key != '' }}
        run: echo "available=$HAS_APP" >> $GITHUB_OUTPUT

      - name: Generate App token
        id: app-token
        if: steps.app-check.outputs.available == 'true'
        uses: actions/create-github-app-token@v2
        continue-on-error: true
        with:
          app-id: ${{ secrets.app_id }}
          private-key: ${{ secrets.app_private_key }}
          owner: ${{ inputs.org }}

      - name: Scan org for compliance
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token || secrets.bot_token || github.token }}
        run: |
          standard-ci scan --org "${{ inputs.org }}" --json \
            > "${{ runner.temp }}/scan-results.json"

      - name: Generate dashboard
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token || secrets.bot_token || github.token }}
        run: |
          standard-ci dashboard --org "${{ inputs.org }}" \
            --scan-results "${{ runner.temp }}/scan-results.json" \
            > "${{ runner.temp }}/dashboard.md"
          cat "${{ runner.temp }}/dashboard.md" >> $GITHUB_STEP_SUMMARY

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: compliance-dashboard
          path: ${{ runner.temp }}/dashboard.md

      - name: Update Gist
        if: inputs.post_to_gist && inputs.gist_id != ''
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || secrets.bot_token }}
        run: |
          gh gist edit "${{ inputs.gist_id }}" \
            -f "compliance-dashboard.md" "${{ runner.temp }}/dashboard.md"

      - name: Open update PRs
        if: inputs.auto_update && inputs.dry_run == false
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token || secrets.bot_token }}
        run: |
          standard-ci auto-update \
            --org "${{ inputs.org }}" \
            --scan-results "${{ runner.temp }}/scan-results.json" \
            --pr-title-prefix "${{ inputs.pr_title_prefix }}" \
            --pr-labels "${{ inputs.pr_labels }}"

      - name: Dry run report
        if: inputs.auto_update && inputs.dry_run
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token || secrets.bot_token }}
        run: |
          standard-ci auto-update \
            --org "${{ inputs.org }}" \
            --scan-results "${{ runner.temp }}/scan-results.json" \
            --dry-run
